name: Modify Last Modified Timestamp

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  modify:
    name: modify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Modify last-updated field
        run: |
          DATE=$(date -Ru)
          for f in $(git diff HEAD~1 --name-only); do
              sed -i "0,/^! Last modified: /s/^\(! Last modified: \).*/\1$DATE/" $f
          done

      - name: Commit changes (if any)
        run: |
          if [[ -n $(git diff) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update modified filter lists with last commit timestamp"
            git push -u origin main
          fi
